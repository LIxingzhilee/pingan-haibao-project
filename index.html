<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>平安好医生商保专享活动｜江苏城市专属福利</title>
  <style>
    :root { --primary:#0A5C36; --bg:#F8F9FA; --text:#212529; --muted:#6C757D; --chip:#F1F3F5; --card:#FFF; --line:rgba(33,37,41,.08); }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei","Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.56;letter-spacing:.2px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    .app{max-width:520px;min-height:100dvh;margin:0 auto;display:flex;flex-direction:column}
    .header{position:sticky;top:0;z-index:30;background:rgba(248,249,250,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .header-inner{padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .brand{font-size:16px;font-weight:700;letter-spacing:.6px;line-height:1.25;min-width:0}
    .location{font-size:12px;color:var(--muted);white-space:nowrap;padding-top:2px}
    .content{padding:16px;display:flex;flex-direction:column;gap:16px;flex:1}
    .hero{font-size:14px;color:var(--muted);margin-top:2px}
    .city-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .city-btn{border:0;background:var(--chip);color:#495057;border-radius:12px;padding:10px 8px;min-height:40px;font-size:13px;font-weight:500;letter-spacing:1px;transition:all .3s ease;cursor:pointer}
    .city-btn:active{transform:scale(.98)}
    .city-btn.active{background:var(--primary);color:#fff;box-shadow:0 8px 20px rgba(10,92,54,.2)}
    .poster-shell{padding:0 2px}
    .poster-card{margin:0;background:var(--card);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.05);overflow:hidden}
    .poster-list{display:flex;flex-direction:column;background:#fff;opacity:1;transition:opacity .3s ease}
    .poster-list.fade-out{opacity:0}
    .poster{width:100%;height:auto;object-fit:contain;display:block;background:#fff}
    .poster+.poster{border-top:1px solid var(--line)}
    .poster-meta{padding:12px 14px 14px;background:linear-gradient(180deg,rgba(255,255,255,.98),#fff)}
    .poster-title{margin:0;font-size:15px;font-weight:600;color:var(--text)}
    .poster-subtitle{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .footer{text-align:center;color:var(--muted);font-size:11px;padding:14px 16px calc(env(safe-area-inset-bottom) + 16px)}
  </style>
</head>
<body>
  <div class="app">
    <header class="header"><div class="header-inner"><div class="brand">平安好医生商保专享活动</div><div id="locationText" class="location">📍 正在为您定位...</div></div></header>
    <main class="content">
      <section class="hero">商保权益，健康直达。为你定制的城市专属福利。</section>
      <section class="city-grid" id="cityGrid" aria-label="城市选择"></section>
      <section class="poster-shell"><figure class="poster-card" aria-live="polite"><div id="posterList" class="poster-list"></div><figcaption class="poster-meta"><h2 id="posterTitle" class="poster-title"></h2><p id="posterSubtitle" class="poster-subtitle"></p></figcaption></figure></section>
    </main>
    <footer class="footer">© 2026 平安好医生商保专享活动 · 活动内容以实际公告为准</footer>
  </div>
  <script>
    const cities=['南京','苏州','无锡','常州','镇江','南通','泰州','扬州','盐城','淮安','宿迁','徐州','连云港'];
    const campaignData={南京:{title:'南京 · 城市健康礼遇',subtitle:'门店专属福利已上线',poster:'海报图片/南京.jpg'},苏州:{title:'苏州 · 品质康养季',subtitle:'甄选好物与健康服务',poster:'海报图片/苏州.jpg'},无锡:{title:'无锡 · 安心守护计划',subtitle:'家庭常备与换季关怀',poster:'海报图片/无锡.jpg'},常州:{title:'常州 · 轻养生活节',subtitle:'科学补给，舒缓有度',poster:'海报图片/常州.jpg'},镇江:{title:'镇江 · 健康焕新周',subtitle:'到店即享城市限定礼',poster:'海报图片/镇江.jpg'},南通:{title:'南通 · 家庭关爱月',subtitle:'一站式备齐健康所需',poster:'海报图片/南通.jpg'},泰州:{title:'泰州 · 慢病关护专场',subtitle:'贴心服务更安心',poster:'海报图片/泰州.jpg'},扬州:{title:'扬州 · 城市福利站',subtitle:'精选品类限时礼遇',poster:'https://picsum.photos/seed/yangzhou-med/900/1600'},盐城:{title:'盐城 · 清新养护礼',subtitle:'日常健康管理更简单',poster:'https://picsum.photos/seed/yancheng-med/900/1600'},淮安:{title:'淮安 · 安心购药周',subtitle:'品质保障，实惠到家',poster:'https://picsum.photos/seed/huaian-med/900/1600'},宿迁:{title:'宿迁 · 元气补给季',subtitle:'活力生活，从健康开始',poster:'海报图片/宿迁.png'},徐州:{title:'徐州 · 守护行动',subtitle:'全龄健康关怀计划',poster:'海报图片/徐州.jpg'},连云港:{title:'连云港 · 海滨健康季',subtitle:'城市限定福利持续中',poster:['海报图片/连云港.jpg','海报图片/连云港1.jpg']}};
    const cityGrid=document.getElementById('cityGrid'); const locationText=document.getElementById('locationText'); const posterList=document.getElementById('posterList'); const posterTitle=document.getElementById('posterTitle'); const posterSubtitle=document.getElementById('posterSubtitle');
    let activeCity='苏州';
    function renderCityTabs(){cityGrid.innerHTML='';cities.forEach(city=>{const btn=document.createElement('button');btn.className=`city-btn ${city===activeCity?'active':''}`;btn.textContent=city;btn.setAttribute('aria-pressed',city===activeCity?'true':'false');btn.addEventListener('click',()=>setActiveCity(city));cityGrid.appendChild(btn);});}
    function updatePoster(city){const data=campaignData[city];posterList.classList.add('fade-out');setTimeout(()=>{const posters=Array.isArray(data.poster)?data.poster:[data.poster];posterList.innerHTML=posters.map((poster,index)=>`<img class="poster" src="${poster}" alt="${city}活动海报${posters.length>1?index+1:''}" />`).join('');posterTitle.textContent=data.title;posterSubtitle.textContent=data.subtitle;},140);setTimeout(()=>posterList.classList.remove('fade-out'),300);}
    function setActiveCity(city){if(city===activeCity)return;activeCity=city;locationText.textContent=`📍 当前城市：${city}`;renderCityTabs();updatePoster(city);}    
    function initLocationStyle(){setTimeout(()=>{locationText.textContent=`📍 当前城市：${activeCity}`;},700);}    
    renderCityTabs();updatePoster(activeCity);initLocationStyle();
  </script>
</body>
</html>
